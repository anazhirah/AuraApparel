<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Apparel Intelligence</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-800 min-h-screen">

    <nav class="bg-gradient-to-r from-yellow-400 via-orange-400 to-pink-500 text-white shadow-md sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 backdrop-blur-sm text-white p-1.5 rounded-lg border border-white/30 shadow-sm">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                <div class="flex flex-col justify-center">
                    <h1 class="text-xl font-bold tracking-tight text-white drop-shadow-sm leading-none">Aura Apparel</h1>
                    <span class="text-[10px] font-semibold text-white/90 uppercase tracking-widest mt-1 drop-shadow-sm">
                        Instagram Fashion Review
                    </span>
                </div>
            </div>
            <span class="bg-white/20 backdrop-blur-sm text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest border border-white/30 shadow-sm">
                Cakenis x Barbie
            </span>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-8">
        
        <div id="dashboardInterface" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4">
                    <div class="bg-emerald-100 text-emerald-600 p-3 rounded-xl">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    </div>
                    <div>
                        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block">Total Interactions</p>
                        <h3 id="statTotal" class="text-2xl font-extrabold text-slate-800">Loading...</h3>
                    </div>
                </div>
                
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4">
                    <div class="bg-violet-100 text-violet-600 p-3 rounded-xl">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    </div>
                    <div>
                        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block">Unique Actors</p>
                        <h3 id="statUsers" class="text-2xl font-extrabold text-slate-800">...</h3>
                    </div>
                </div>

                <div id="statusCard" class="bg-amber-500 p-6 rounded-2xl shadow-sm border border-amber-600 text-white flex flex-col justify-center transition-colors duration-500">
                    <p class="text-[11px] font-bold text-white/80 uppercase tracking-wider block mb-1">Status</p>
                    <div class="flex items-center gap-2">
                        <span class="relative flex h-3 w-3">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-white"></span>
                        </span>
                        <span id="statusText" class="text-sm font-semibold">Connecting to Data Node...</span>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mt-6">
                <div class="bg-slate-50 border-b border-slate-200 px-6 py-4">
                    <h3 class="text-sm font-bold text-slate-700">Live Community Feed</h3>
                </div>
                
                <div id="feedList" class="max-h-[600px] overflow-y-auto p-6 space-y-6">
                    </div>
            </div>
        </div>
    </main>

    <script>
        // ⚠️ CHANGE THIS to the exact name of the Excel file uploaded to your GitHub repository
        const TARGET_FILE = './dataCakenis.xlsx';

        async function autoLoadExcel() {
            try {
                // 1. Fetch the Excel file from GitHub
                const response = await fetch(TARGET_FILE);
                
                if (!response.ok) {
                    throw new Error(`Could not find "${TARGET_FILE}". Check your repository files.`);
                }

                // 2. Read the raw data and convert it via SheetJS
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                const workbook = XLSX.read(data, {type: 'array'});
                
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

                if(jsonData.length === 0) throw new Error("Excel sheet is empty.");

                // 3. Update the Dashboard
                buildDashboard(jsonData);
                
                // Update Status Card to Success
                const statusCard = document.getElementById('statusCard');
                statusCard.classList.remove('bg-amber-500', 'border-amber-600');
                statusCard.classList.add('bg-emerald-500', 'border-emerald-600');
                document.getElementById('statusText').innerText = "Data Stream Synced";

            } catch (error) {
                // Update Status Card to Error
                const statusCard = document.getElementById('statusCard');
                statusCard.classList.remove('bg-amber-500', 'border-amber-600');
                statusCard.classList.add('bg-rose-500', 'border-rose-600');
                document.getElementById('statusText').innerText = `Error: ${error.message}`;
            }
        }

        function buildDashboard(data) {
            document.getElementById('statTotal').innerText = data.length;
            
            const uniqueUsers = new Set();
            data.forEach(row => {
                if(row['Username']) uniqueUsers.add(row['Username']);
            });
            document.getElementById('statUsers').innerText = uniqueUsers.size;

            const feed = document.getElementById('feedList');
            feed.innerHTML = '';

            data.forEach((row, index) => {
                const avatarSrc = row['Avatar URL'] ? row['Avatar URL'] : `https://ui-avatars.com/api/?name=${encodeURIComponent(row['Username'] || 'User')}&background=fbcfe8&color=be123c`;
                const dateText = row['Date'] || 'Recent';
                const commentText = row['Comment Text'] || 'No text provided.';
                const profileUrl = row['Profile URL'] || '#';
                const username = row['Username'] || 'Anonymous';

                const isLast = index === data.length - 1;
                const lineStyle = isLast ? '' : 'border-l-2 border-slate-100 pb-8';

                feed.innerHTML += `
                    <div class="relative pl-4 ${lineStyle} ml-6">
                        <div class="absolute -left-6 top-0 bg-white p-1 rounded-full border border-slate-200">
                            <a href="${profileUrl}" target="_blank">
                                <img src="${avatarSrc}" alt="${username}" class="w-10 h-10 rounded-full object-cover">
                            </a>
                        </div>
                        
                        <div class="bg-slate-50 hover:bg-orange-50/50 p-4 rounded-xl border border-slate-200 transition duration-200 ml-4 shadow-sm">
                            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-baseline mb-2 gap-1">
                                <a href="${profileUrl}" target="_blank" class="text-sm font-bold text-slate-900 hover:text-orange-500 transition">
                                    @${username}
                                </a>
                                <span class="text-[10px] font-mono text-slate-400 bg-white px-2 py-0.5 rounded border border-slate-200 shadow-sm">
                                    ${dateText}
                                </span>
                            </div>
                            <p class="text-sm text-slate-600 leading-relaxed whitespace-pre-wrap">${commentText}</p>
                        </div>
                    </div>
                `;
            });
        }

        // Trigger the download the moment the page opens
        window.onload = autoLoadExcel;
    </script>
</body>
</html>
